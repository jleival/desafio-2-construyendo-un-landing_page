<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DecoPLantas</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/normalize.css">
  </head>
  <body>
    <!-- Header -->
    <header>
      <h1>DecoPlantas</h1>
      <p>Plantas decorativas para tu hogar</p>
    </header>
    <!-- Producto 1 -->
    <div class="container">
      <div class="product-section">
        <img src="./assets/imgs/1.jpg" alt="Producto 1" class="product-image" />
        <div class="product-text">
          <h2><span>Planta 1</span></h2>
          <h3>Precio: $9.990</h3>
        </div>
      </div>
      <!-- Producto 2 -->
      <div class="product-section">
        <img src="./assets/imgs/2.jpg" alt="Producto 2" class="product-image" />
        <div class="product-text">
          <h2><span>Planta 2</span></h2>
          <h3>Precio: $12.700</h3>
        </div>
      </div>
      <!-- Producto 3 -->
      <div class="product-section">
        <img src="./assets/imgs/3.jpg" alt="Producto 3" class="product-image" />
        <div class="product-text">
          <h2><span>Planta 3</span></h2>
          <h3>Precio: $11.990</h3>
        </div>
      </div>
      <!-- Footer -->
      <div class="footer">
        <p>@decoplantas</p>
      </div>
    </div>
  </body>
</html>
